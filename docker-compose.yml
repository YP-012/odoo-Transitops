version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: fleetflow
      POSTGRES_PASSWORD: fleetflow123
      POSTGRES_DB: fleetflow_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetflow -d fleetflow_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: .
      dockerfile: server/Dockerfile
    environment:
      - DB_USER=fleetflow
      - DB_PASSWORD=fleetflow123
      - DB_NAME=fleetflow_dev
      - DB_HOST=db
      - DB_PORT=5432
      - JWT_SECRET=your_super_secret_jwt_key_here
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "node migrate.js && npm start"

  frontend:
    build:
      context: ./client
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
